<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dang Valley | Menu</title>
  <meta name="description" content="Digital menu for Dang Valley Hotel & Restaurant" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="brand">
      <span class="brand-icon">🏞️</span>
      <h1>Dang Valley</h1>
    </div>
    <p class="tagline">Hotel &amp; Restaurant</p>
    <div class="header-rule"></div>
  </header>

  <nav class="category-nav" id="categoryNav" aria-label="Menu categories">
    <!-- category links injected by menu.js -->
  </nav>

  <main id="menuContainer" class="menu-container">
    <!-- menu sections injected by menu.js -->
  </main>

  <button id="backToTop" class="back-to-top" aria-label="Back to top">↑</button>

  <div id="orderBar" class="order-bar">
    <span id="orderCount">0 items selected</span>
    <a id="orderWhatsappBtn" class="whatsapp-btn" target="_blank" rel="noopener">
      📲 Send Order on WhatsApp
    </a>
  </div>

  <footer class="site-footer">
    <p>📍 Dang Valley, Nepal &nbsp;|&nbsp; 📞 +977 981-7435846</p>
  </footer>

  <script src="menu.js"></script>
</body>
</html>
